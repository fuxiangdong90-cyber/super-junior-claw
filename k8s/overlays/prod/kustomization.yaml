# 生产环境覆盖配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-validation

bases:
  - ../base

patchesStrategicMerge:
  - patch-backend.yaml
  - patch-frontend.yaml

commonLabels:
  environment: production

configMapGenerator:
  - name: app-config
    literals:
      - DEBUG=false
      - LOG_LEVEL=info
      - ENVIRONMENT=production

# 生产环境镜像 (使用正式版本)
images:
  - name: ai-validation-backend
    newTag: v1.0.0
  - name: ai-validation-frontend
    newTag: v1.0.0

# 生产环境资源限制
replicas:
  backend: 3
  frontend: 2