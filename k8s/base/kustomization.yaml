# Kustomization基础配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-validation

resources:
  - 00-namespace.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - frontend.yaml

commonLabels:
  app: ai-validation-platform

images:
  - name: ai-validation-backend
    newTag: latest
  - name: ai-validation-frontend
    newTag: latest