# Secrets配置
apiVersion: v1
kind: Secret
metadata:
  name: ai-validation-secrets
  namespace: ai-validation
type: Opaque
stringData:
  # 数据库
  postgres-user: postgres
  postgres-password: your-secure-password
  # JWT
  secret-key: your-jwt-secret-key-change-in-production
  # Redis
  redis-password: ""
  # RabbitMQ
  rabbitmq-user: guest
  rabbitmq-password: guest